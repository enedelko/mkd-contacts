# BE-01 — Инфраструктура: frontend, backend, db (SR-BE01-001)
# Перед контейнерами — Nginx на хосте (SR-BE01-006). Порты контейнеров только на localhost (SR-BE01-007).
# См. docs/deploy/01-bootstrap.md и nginx-host.example.conf
#
# ВАЖНО: Значения по умолчанию (mkd_secret и т.д.) — только для разработки.
# В production обязательно использовать .env с уникальными паролями и секретами.

x-restart: &default-restart
  restart: unless-stopped

x-env-tz: &env-tz
  TZ: Europe/Moscow

services:
  db:
    <<: *default-restart
    image: postgres:15-alpine
    container_name: mkd-db
    environment:
      <<: *env-tz
      PGTZ: Europe/Moscow
      POSTGRES_USER: ${POSTGRES_USER:-mkd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mkd_secret}
      POSTGRES_DB: ${POSTGRES_DB:-mkd_contacts}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mkd} -d ${POSTGRES_DB:-mkd_contacts}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    <<: *default-restart
    build:
      context: ./backend
    container_name: mkd-backend
    env_file: .env
    environment:
      <<: *env-tz
      DATABASE_URL: postgresql://${POSTGRES_USER:-mkd}:${POSTGRES_PASSWORD:-mkd_secret}@db:5432/${POSTGRES_DB:-mkd_contacts}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_SOCKS5_PROXY: ${TELEGRAM_SOCKS5_PROXY:-}
      JWT_SECRET: ${JWT_SECRET:-}
      BLIND_INDEX_PEPPER: ${BLIND_INDEX_PEPPER:-}
      MASTER_KEY_PATH: ${MASTER_KEY_PATH:-}
      BOT_API_TOKEN: ${BOT_API_TOKEN:-}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # Мастер-ключ (BE-02): не в репозитории — см. docs/deploy/01-bootstrap.md (secrets / bind mount).

  frontend:
    <<: *default-restart
    build:
      context: ./frontend
      args:
        VITE_TELEGRAM_BOT_USERNAME: ${VITE_TELEGRAM_BOT_USERNAME:-}
    container_name: mkd-frontend
    environment:
      <<: *env-tz
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend

  bot:
    <<: *default-restart
    build:
      context: ./bot
    container_name: mkd-bot
    environment:
      <<: *env-tz
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_SOCKS5_PROXY: ${TELEGRAM_SOCKS5_PROXY:-}
      TELEGRAM_LOG_CURL_WITH_TOKEN: ${TELEGRAM_LOG_CURL_WITH_TOKEN:-}
      BOT_API_TOKEN: ${BOT_API_TOKEN:-}
      BACKEND_URL: http://backend:8000
      WEBHOOK_HOST: ${WEBHOOK_HOST:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      SESSION_DB_PATH: /data/sessions.db
    volumes:
      - bot_data:/data
    ports:
      - "127.0.0.1:8443:8443"
    depends_on:
      - backend

  # OPS-03: проверка доступности приложения, при двух подряд неуспехах — алерт в Telegram
  uptime-check:
    <<: *default-restart
    build:
      context: .
      dockerfile: uptime-check/Dockerfile
    container_name: mkd-uptime-check
    environment:
      <<: *env-tz
      UPTIME_CHECK_URL: ${UPTIME_CHECK_URL:-http://backend:8000/health}
      UPTIME_CHECK_INTERVAL_SEC: ${UPTIME_CHECK_INTERVAL_SEC:-600}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_SOCKS5_PROXY: ${TELEGRAM_SOCKS5_PROXY:-}
      TELEGRAM_CHAT_ID: ${UPTIME_TELEGRAM_CHAT_ID:-}
    depends_on:
      - backend

volumes:
  pgdata:
    # Персистентные данные PostgreSQL (SR-BE01-002)
  bot_data:
    # Персистентные сессии бота (SQLite FSM storage)
